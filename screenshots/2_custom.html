<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <title>TexVault — Custom Snippets</title>
  <link rel="stylesheet" href="../lib/katex.min.css">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="_shared.css">
</head>
<body>
<div class="popup-shell">

  <header class="header">
    <img class="header__icon" src="../icons/texvaultlogo.svg" alt="" aria-hidden="true">
    <span class="header__logo">Tex<span class="header__logo-accent">Vault</span></span>
    <button class="btn-icon header__settings-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
    </button>
  </header>

  <nav class="tabs">
    <div class="tabs__nav">
      <button class="tab tab--active" data-tab="custom">Custom</button>
      <button class="tab" data-tab="templates">Library</button>
    </div>
    <div class="tabs__actions">
      <button class="btn-icon"><svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="1" y="2" width="12" height="2.5" rx="1.25"/><rect x="1" y="5.75" width="8.5" height="2.5" rx="1.25"/><rect x="1" y="9.5" width="5" height="2.5" rx="1.25"/></svg></button>
      <button class="btn-icon"><svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="0" y="0" width="6" height="6" rx="1"/><rect x="8" y="0" width="6" height="6" rx="1"/><rect x="0" y="8" width="6" height="6" rx="1"/><rect x="8" y="8" width="6" height="6" rx="1"/></svg></button>
      <button class="btn-icon"><svg width="18" height="18" viewBox="0 0 15 15" fill="currentColor"><path d="M1.5 4a1 1 0 011-1H5.8l1.1 1.1a1 1 0 00.7.3H12.5a1 1 0 011 1V11a1 1 0 01-1 1h-10a1 1 0 01-1-1V4z"/></svg></button>
    </div>
  </nav>

  <div class="search-bar">
    <div class="search-bar__wrap">
      <input type="search" class="search-input" placeholder="Search snippets and code..." readonly>
    </div>
  </div>

  <div class="content-area">
    <main class="panels">
      <section class="panel panel--active">
        <div class="card-grid" id="grid">

          <!-- Euler's Identity — pinned -->
          <div class="card" data-f="e^{i\pi} + 1 = 0" data-n="Euler's Identity" data-pinned="true"></div>
          <!-- Taylor Series -->
          <div class="card" data-f="\sum_{n=0}^{\infty} \frac{f^{(n)}(a)}{n!}(x-a)^n" data-n="Taylor Series"></div>
          <!-- Bayes' Theorem -->
          <div class="card" data-f="P(A|B) = \frac{P(B|A)\,P(A)}{P(B)}" data-n="Bayes' Theorem"></div>
          <!-- Eigenvalue -->
          <div class="card" data-f="A\mathbf{v} = \lambda\mathbf{v}" data-n="Eigenvalue Eq."></div>
          <!-- Homework Template — text type -->
          <div class="card" data-code="\documentclass{article}
\usepackage{amsmath}
\begin{document}
\title{Homework}
\maketitle
\end{document}" data-n="Homework Template"></div>
          <!-- Stokes' Theorem -->
          <div class="card" data-f="\iint_S (\nabla \times \mathbf{F})\cdot d\mathbf{S} = \oint_C \mathbf{F}\cdot d\mathbf{r}" data-n="Stokes' Theorem"></div>

          <!-- Add card -->
          <div class="card card--add" id="add-card">
            <span style="font-size:26px; color: var(--accent); font-weight:300; line-height:1;">+</span>
          </div>

        </div>
      </section>
    </main>
  </div>

  <!-- FAB -->
  <button class="fab" style="position:absolute; bottom:22px; right:20px; width:44px; height:44px; border-radius:50%; background:var(--accent); border:none; color:#fff; font-size:22px; font-weight:300; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 16px rgba(5,150,105,0.45); cursor:pointer; z-index:100;">+</button>

</div>

<script src="../lib/katex.min.js"></script>
<script>
const PIN = `<svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M9.828.722a.5.5 0 0 1 .354.146l4.95 4.95a.5.5 0 0 1 0 .707c-.48.48-1.072.588-1.503.588-.177 0-.335-.018-.46-.039l-3.134 3.134a5.927 5.927 0 0 1 .16 1.013c.046.702-.032 1.687-.72 2.375a.5.5 0 0 1-.707 0l-2.829-2.828-3.182 3.182c-.195.195-1.219.902-1.414.707-.195-.195.512-1.22.707-1.414l3.182-3.182-2.828-2.829a.5.5 0 0 1 0-.707c.688-.688 1.673-.767 2.375-.72a5.922 5.922 0 0 1 1.013.16l3.134-3.133a2.772 2.772 0 0 1-.04-.461c0-.43.108-1.022.589-1.503a.5.5 0 0 1 .353-.146z"/></svg>`;

document.querySelectorAll('.card[data-f]').forEach(card => {
  const preview = document.createElement('div');
  preview.className = 'card__preview';
  try {
    preview.innerHTML = katex.renderToString(card.dataset.f, { displayMode: true, throwOnError: true, strict: false });
  } catch(e) {
    preview.classList.add('card__preview--code');
    preview.textContent = card.dataset.f;
  }
  const name = document.createElement('div');
  name.className = 'card__name';
  name.textContent = card.dataset.n;
  const pin = document.createElement('button');
  pin.className = 'card__pin';
  if (card.dataset.pinned) {
    pin.style.cssText = 'position:absolute;bottom:6px;right:6px;background:rgba(5,150,105,0.14);border:none;color:var(--accent);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;';
  } else {
    pin.style.cssText = 'position:absolute;bottom:6px;right:6px;background:none;border:none;color:rgba(0,0,0,0.15);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;';
  }
  pin.innerHTML = PIN;
  card.appendChild(preview);
  card.appendChild(name);
  card.appendChild(pin);
  delete card.dataset.f;
  delete card.dataset.n;
});

document.querySelectorAll('.card[data-code]').forEach(card => {
  const preview = document.createElement('div');
  preview.className = 'card__preview card__preview--code';
  preview.textContent = card.dataset.code.split('\n').filter(l => l.trim()).slice(0, 5).join('\n');
  const name = document.createElement('div');
  name.className = 'card__name';
  name.textContent = card.dataset.n;
  const pin = document.createElement('button');
  pin.style.cssText = 'position:absolute;bottom:6px;right:6px;background:none;border:none;color:rgba(0,0,0,0.15);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;';
  pin.innerHTML = PIN;
  card.appendChild(preview);
  card.appendChild(name);
  card.appendChild(pin);
  delete card.dataset.code;
  delete card.dataset.n;
});

function scaleKatexToFit(el) {
  const k = el.querySelector('.katex');
  if (!k) return;
  k.style.transform = 'none';
  const cw = el.clientWidth, ch = el.clientHeight;
  if (!cw || !ch) return;
  const kw = k.scrollWidth, kh = k.scrollHeight;
  if (!kw || !kh) return;
  const scale = Math.min((cw - 10) / kw, (ch - 10) / kh, 1.5);
  if (scale > 1.08 || scale < 0.95) {
    k.style.transformOrigin = 'center center';
    k.style.transform = `scale(${Math.max(scale, 0.25)})`;
  }
}
setTimeout(() => document.querySelectorAll('.card__preview').forEach(scaleKatexToFit), 120);
</script>
</body>
</html>
